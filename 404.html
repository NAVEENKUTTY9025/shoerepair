<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Page not found - SoleRestore">
    <title>SoleRestore | 404 - Page Not Found</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23111111'/%3E%3Cpath d='M30 50 L70 50 M30 60 L70 60 M50 30 L50 70' stroke='%238B5E3C' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== CSS VARIABLES ===== */
        :root {
            --primary: #111111;
            --secondary: #8B5E3C;
            --accent: #A47148;
            --white: #FFFFFF;
            --bg-main: #FFFFFF;
            --text-heading: #111111;
            --text-body: #333333;
            --text-light: #666666;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        [data-theme="dark"] {
            --primary: #111111;
            --secondary: #8B5E3C;
            --accent: #A47148;
            --white: #FFFFFF;
            --bg-main: #0A0A0A;
            --text-heading: #FFFFFF;
            --text-body: #CCCCCC;
            --text-light: #999999;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Logo Only - No Navbar, No Footer */
        .logo-container {
            position: absolute;
            top: 32px;
            left: 32px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background-color: var(--secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .logo-icon i {
            color: var(--white);
            font-size: 22px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--secondary);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--secondary);
        }

        /* Theme Toggle - Small, in top right corner */
        .theme-toggle-wrapper {
            position: absolute;
            top: 32px;
            right: 32px;
            z-index: 100;
        }

        .theme-toggle {
            width: 42px;
            height: 42px;
            background-color: rgba(139, 94, 60, 0.1);
            border: 1px solid rgba(139, 94, 60, 0.2);
            border-radius: 12px;
            color: var(--secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .theme-toggle:hover {
            background-color: var(--secondary);
            color: var(--white);
            transform: scale(1.05);
        }

        /* Main 404 Content - Perfectly Centered */
        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .error-content {
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Animated 404 Number */
        .error-code {
            font-size: clamp(120px, 20vw, 220px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            text-shadow: var(--shadow-lg);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Broken shoe icon animation */
        .broken-icon {
            font-size: 70px;
            color: var(--secondary);
            margin-bottom: 20px;
            display: inline-block;
            animation: shake 0.8s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .error-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            color: var(--text-heading);
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 32px;
            line-height: 1.6;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(139, 94, 60, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(139, 94, 60, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background-color: rgba(139, 94, 60, 0.1);
            transform: translateY(-3px);
        }

        /* Decorative elements - floating leather patches */
        .decor-element {
            position: absolute;
            pointer-events: none;
            opacity: 0.4;
            z-index: 0;
        }

        .decor-1 {
            bottom: 10%;
            left: 5%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, var(--secondary) 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 50%;
            opacity: 0.15;
        }

        .decor-2 {
            top: 15%;
            right: 8%;
            width: 80px;
            height: 80px;
            border: 3px dashed var(--secondary);
            border-radius: 30px;
            opacity: 0.2;
            animation: spin 20s linear infinite;
        }

        .decor-3 {
            bottom: 20%;
            right: 10%;
            width: 60px;
            height: 60px;
            background-color: rgba(139, 94, 60, 0.08);
            border-radius: 20px;
            transform: rotate(45deg);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* RTL Support */
        [dir="rtl"] .logo-container {
            left: auto;
            right: 32px;
        }

        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 32px;
        }

        [dir="rtl"] .btn-primary i,
        [dir="rtl"] .btn-outline i {
            margin-right: 0;
            margin-left: 8px;
        }

        /* No scrollbar - fixed layout */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .logo-container {
                top: 20px;
                left: 20px;
            }
            .theme-toggle-wrapper {
                top: 20px;
                right: 20px;
            }
            [dir="rtl"] .logo-container {
                left: auto;
                right: 20px;
            }
            [dir="rtl"] .theme-toggle-wrapper {
                right: auto;
                left: 20px;
            }
            .button-group {
                gap: 12px;
            }
            .btn-primary, .btn-outline {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            .broken-icon {
                font-size: 50px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Logo Only - Top Left -->
    <div class="logo-container">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <i class="fas fa-shoe-prints"></i>
            </div>
            <span class="logo-text">Sole<span>Restore</span></span>
        </a>
    </div>

    <!-- Theme Toggle - Top Right (Optional but nice for user preference) -->
  

    <!-- Main 404 Content - Perfectly Centered, No Scroll -->
    <div class="error-container">
        <div class="error-content">
            <div class="broken-icon">
                <i class="fas fa-shoe-prints fa-flip"></i>
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Oops! It seems like this page has walked away. The shoe you're looking for might be under repair or never existed.
            </p>
            <div class="button-group">
                <a href="index.html" class="btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="contact.html" class="btn-outline">
                    <i class="fas fa-envelope"></i> Contact Support
                </a>
            </div>
        </div>
    </div>

    <!-- Decorative Elements -->
    <div class="decor-element decor-1"></div>
    <div class="decor-element decor-2"></div>
    <div class="decor-element decor-3"></div>

    <script>
        // ===== THEME TOGGLE (Dark/Light Mode) - No scrolling, just visual =====
        const htmlElement = document.documentElement;
        
        // Get saved theme or default to light
        const savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        
        // Function to update theme icon
        function updateThemeIcon() {
            const isDark = htmlElement.getAttribute('data-theme') === 'dark';
            const iconClass = isDark ? 'fa-sun' : 'fa-moon';
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) themeIcon.className = `fas ${iconClass}`;
        }
        
        // Function to toggle theme
        function toggleTheme() {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon();
        }
        
        // Add event listener to theme toggle button
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', toggleTheme);
        }
        
        // Initialize theme icon
        updateThemeIcon();
        
        // ===== RTL Support (optional, for consistency) =====
        const savedDir = localStorage.getItem('direction') || 'ltr';
        htmlElement.setAttribute('dir', savedDir);
        
        // Simple RTL toggle if needed (can be added but not required for 404)
        // For now just respect saved direction
        
        // ===== Prevent any accidental scrolling =====
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        document.body.addEventListener('wheel', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // But allow clicking on buttons and links normally (they don't cause scroll)
        // Disable keyboard arrow keys from scrolling
        window.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'PageDown' || e.key === 'PageUp' || e.key === 'Home' || e.key === 'End') {
                e.preventDefault();
            }
        });
        
        // Ensure body has no overflow
        document.body.style.overflow = 'hidden';
        document.documentElement.style.overflow = 'hidden';
        
        // Optional: Add a little easter egg - console message
        console.log("%c🛠️ SoleRestore | 404 Error", "color: #8B5E3C; font-size: 14px; font-weight: bold;");
        console.log("%cThe page you're looking for seems to have taken a day off. Try our homepage!", "color: #666; font-size: 12px;");
    </script>
</body>
</html>
